imageAlt: A noir shrimp-folk movie poster with a trench-coated detective, rainlit New Atlantis canals, diagonal window shadows, a reflected watcher, and glyph title lettering.
summary: Canal rain, pressure glass, and a private detective silhouette translate noir suspicion into a New Atlantis cinema artifact.
description: The poster preserves film noir's severe diagonal lighting, divided reflection, and solitary investigator while making the detective's shell, antennae, claws, and tail fan integral to the silhouette. Its glyph title band reads as local cinema typography rather than as false-readable display copy.
