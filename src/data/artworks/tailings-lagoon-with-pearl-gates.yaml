imageAlt: A formal photograph of a shrimp-folk industrial tailings lagoon with a central shell-concrete gatehouse, mauve water, orange residue, distant refinery haze, and sparse crustacean technicians along the wall.
summary: Civic order frames a contaminated lagoon whose reflection cannot conceal the residue passing through it.
description: The strict frontal composition gives containment architecture the gravity of a public monument while the rust-colored plume breaks that order. Sparse shrimp-folk technicians and claw-scaled valves keep the site rooted in civic labor rather than anonymous industrial spectacle.
