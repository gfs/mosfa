    Imagegen produced a photographed physical newspaper artifact on aged newsprint with a dated folio line, the standing motto "All the News That's Fit to Brine," pearlmark price, an ornate engraved masthead, and the corrected outer headline "BRINEMAN DEFEATS DEWCLAW" in period serif display type. The halftone press photo inside the page shows Brineman holding a styled miniature New Atlantis Times extra, complete with its own masthead, folio, motto, shell-script columns, and the incorrect headline "DEWCLAW DEFEATS BRINEMAN."
  lessons:
    - In a Dewey Defeats Truman-style homage, the outer page should carry the corrected result when it frames the famous photograph.
    - The incorrect headline must remain visible on the newspaper held inside the press photo.
    - Include an event date in the folio line so the object reads as a real newspaper.
    - The New Atlantis Times masthead should feel custom, engraved, and civic; headlines and subheads should use period newspaper serif or slab-serif type rather than modern computer fonts.
    - When a newspaper appears inside a newspaper photograph, give the nested object the same press conventions instead of rendering it as a plain headline sign.
