imageAlt: A dated New Atlantis Times front page for Wednesday, November 3, 1948, photographed on aged newsprint with the corrected headline Brineman Defeats Dewclaw above a halftone image of a shrimp-folk candidate holding a miniature New Atlantis Times extra that reads Dewclaw Defeats Brineman.
summary: The corrected front page frames a famous miscalled election extra as a layered press image.
description: The outer headline records Brineman's victory, while the photograph preserves the earlier paper that wrongly named Dewclaw. That double-page structure gives the accession its civic comedy and keeps the homage tied to the mechanics of newspaper correction.
