imageAlt: A dark Goya-like Black Painting of a crouched aged shrimp-folk titan with staring eyes gripping a broken smaller shell figure against a black void.
summary: Goya's nightmare of succession becomes an ancient reef myth of power clutching its own future.
description: The image preserves the Black Painting's void, crouched body, frantic stare, and crushing vertical grip while translating the victim into a broken heir-shell and the tyrant into coherent shrimp-folk anatomy. Its violence remains symbolic rather than graphic, turning carapace fracture and antenna tension into the scene's ritual dread.
