  successfulPrompt: |
    Use case: stylized-concept.
    Asset type: fresh MoSFA artwork candidate, full vertical painting.
    Primary request: Generate a new shrimp-folk reinterpretation of Francisco Goya's Saturn Devouring his Son, titled Brinefather Devouring the Heir. Start from scratch; do not preserve any prior generated face.
    Composition: a crouched aged shrimp-folk titan in a black void, frontal three-quarter pose, gripping a broken smaller heir-shell figure vertically, preserving the major silhouette, darkness, dread, and visual hierarchy of Goya's Black Painting. Symbolic violence only, carapace fracture instead of gore.
    Critical anatomy constraint: the Brinefather has exactly TWO long upper antennae. Both upper antennae emerge from clearly visible matching round shell sockets on the upper front carapace, placed symmetrically above the eyes, left and right of the central face, on the same horizontal level. The two socket bases are identical in size and height, equidistant from the central rostrum. The central nose/rostrum is clean and uninterrupted, with no antenna attached to it. The eyes and eyelids are clean, with no antenna growing from an eyelid, lash line, eye rim, or eye socket. The mouth area may have small lower feelers, but those must be visually separate from the two upper antennae.
    Style: Spanish Romantic Black Painting, thick dark oil paint, ocher and umber shell highlights, severe chiaroscuro, rough fresco-like texture, anguished stare, museum-grade serious tone.
    Avoid: no humans, no food joke, no meme humor, no shrimp pasted onto a human body, no eyelash antenna, no nose antenna, no antenna rooted on the bridge or tip of the rostrum, no extra long upper antennae, no tangled whisker cluster, no labels, no watermark.
