imageAlt: An elevated photograph of vast shrimp-folk tide-field agriculture at low water, with rectangular wet grids, a pale green runoff canal, claw-scaled valves, crawlers, and a few crustacean workers.
summary: Agricultural order turns the tidal flat into a measured surface, with runoff becoming the field's visible accounting line.
description: The photograph holds the grid's severe beauty against the damaged water it releases, making production and consequence share one diagonal structure. Sparse shrimp-folk workers, low crawlers, and claw-scaled gauges keep the scene infrastructural instead of theatrical.
