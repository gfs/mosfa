imageAlt: A damp canal-wall mural with red and yellow shrimp-folk painters, spray cans, canal reflections, and a bright turquoise, magenta, yellow, and blue shell-script wildstyle piece.
summary: Aerosol color, canal reflection, and flanking painter bodies turn public wall writing into reef-city civic craft.
description: The mural treats wildstyle lettering as a collaborative current rather than a signature alone. Spray shell, paint vessel, wet concrete, and reflected color anchor its Pop energy in the labor of reef-city wall painting.
