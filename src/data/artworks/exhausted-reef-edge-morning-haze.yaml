imageAlt: A hazy coastal photograph of a depleted reef edge with porous bleached rock, tidal pools, receding monitoring pylons, distant industrial silhouettes, and a shrimp-folk engineer at a gauge platform.
summary: A depleted reef becomes a field of witness, where late instruments of repair stand among the remains of extraction.
description: Morning haze and low-tide reflection soften the scene without hiding its damage. The lone shrimp-folk engineer bends over a monitoring frame, making civic repair feel present but belated.
