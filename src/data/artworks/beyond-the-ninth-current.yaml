imageAlt: A painted shrimp-folk space-opera poster with a heroic adventuring ensemble, masked rival, pearl astrolabe, coral orbital gate, star skiffs, moons, and glyph title lettering.
summary: Pearl navigation, star skiffs, and ensemble spectacle recast blockbuster adventure as a shrimp-folk myth of the outer currents.
description: The poster adopts the theatrical pyramid of late-century adventure one-sheets while routing heroic iconography through shell armor, antenna-safe tools, clawed gestures, and reef-born cosmic machinery. Its lower glyph field preserves the rhythm of cinema billing without inviting false-readable copy.
