imageAlt: A dated New Atlantis Times front page for Friday, November 10, 1989, photographed on aged newsprint with the headline Barrier Reef Falls, a halftone image of shrimp-folk citizens at an opened reef gate, and shell-script news columns.
summary: A hard headline, breached reef gate, and shell-script columns convert civic rupture into press memory.
description: The page preserves the single-day authority of late twentieth-century front pages while letting New Atlantis' own writing system occupy the detailed reportage. Its open gate photograph gives the pun civic architecture rather than leaving it as a caption joke.
