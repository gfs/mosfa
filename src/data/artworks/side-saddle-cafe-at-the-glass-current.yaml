imageAlt: A Synthetic Cubist cafe interior with shrimp-folk patrons seated side-saddle on open stools beside a round table, pressure-glass windows, reef-city silhouettes, and fish outside.
summary: Open stools, side-saddle patrons, and pressure-glass reflections hold cafe conversation inside a readable Cubist interior.
description: Seated around a small round table, the patrons keep legs, tails, cups, and stools in clear relation while the window panes break reef-city light into Cubist facets. Passing fish and a standing server extend the scene beyond the table, making the cafe feel civic rather than anecdotal.
